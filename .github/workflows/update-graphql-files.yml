name: "Update GraphQL files"
on:
  schedule:
    - cron: "0 10 * * 1"
      timezone: "Asia/Singapore"
  workflow_dispatch:

jobs:
  update-graphql-schema:
    env:
      HUSKY: 0
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GraphQL schema
        env:
          ACCESS_TOKEN: ${{ secrets.NUXT_GITHUB_SECRET }}
        run: |
          pnpm exec gql-tada generate-schema \
            "https://api.github.com/graphql" \
            --output ./app/graphql/types/github-schema.graphql \
            --header "Authorization: Bearer $ACCESS_TOKEN"

      - name: Generate GraphQL output typings file
        run: pnpm exec gql-tada generate-output

      - name: Generate a cache for all GraphQL document types
        run: pnpm exec gql-tada turbo --fail-on-warn

      - name: Check the GraphQL configuration
        run: pnpm exec gql-tada doctor

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-github-graphql-schema
          body: |
            # Describe your change(s)

            Automated weekly update of GitHub GraphQL schema and output typings.

            ## Type of change(s)

            - [X] Update TypeScript declaration file
          commit-message: "chore: Update the GitHub GraphQL schema and output typings"
          title: "chore: Update the GitHub GraphQL schema and output typings"
          token: ${{ secrets.BOT_PAT }}
