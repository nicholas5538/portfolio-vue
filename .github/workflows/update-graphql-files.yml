name: "Update GraphQL files"
on:
  schedule:
    - cron: "0 10 * * 1"
      timezone: "Asia/Singapore"

jobs:
  update-graphql-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GraphQL schema
        env:
          ACCESS_TOKEN: ${{ secrets.NUXT_GITHUB_SECRET }}
        run: |
          pnpm exec gql-tada generate-schema \
            "https://api.github.com/graphql" \
            --output ./app/graphql/types/github-schema.graphql
            --header "Authorization: Bearer $ACCESS_TOKEN" \

      - name: Generate GraphQL output typings file
        run: pnpm exec gql-tada generate-output

      - name: Generate a cache for all GraphQL document types
        run: pnpm exec gql-tada turbo --fail-on-warn

      - name: Check the GraphQL configuration
        run: pnpm exec gql-tada doctor --fail-on-warn

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -am "Update GitHub GraphQL schema [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
